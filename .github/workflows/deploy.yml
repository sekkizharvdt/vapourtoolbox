name: Deploy - Production

on:
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: 'Deploy all targets (skip change detection)'
        type: boolean
        default: false
      skip_smoke:
        description: 'EMERGENCY ONLY: skip the money-path smoke e2e gate'
        type: boolean
        default: false

# Only one deployment at a time. Don't cancel mid-flight.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Detect which deploy targets need to run.
  # Compares against the last successful prod-deploy SHA stored as a tag,
  # falling back to HEAD~1 if no tag exists. Force-full input bypasses.
  # ─────────────────────────────────────────────────────────────
  detect:
    name: Detect changed targets
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      rules: ${{ steps.changes.outputs.rules }}
      indexes: ${{ steps.changes.outputs.indexes }}
      storage: ${{ steps.changes.outputs.storage }}
      functions: ${{ steps.changes.outputs.functions }}
      hosting: ${{ steps.changes.outputs.hosting }}
      base_sha: ${{ steps.changes.outputs.base_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect changes
        id: changes
        run: |
          set -e
          if [ "${{ inputs.force_full_deploy }}" = "true" ]; then
            echo "Force-full deploy requested — every target will run."
            for t in rules indexes storage functions hosting; do
              echo "${t}=true" >> $GITHUB_OUTPUT
            done
            echo "base_sha=force_full" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find the last successful prod deploy by tag. We tag the deployed
          # commit as `prod-deployed` after each successful run (see the
          # Tag deployed commit step below).
          if git rev-parse --verify --quiet refs/tags/prod-deployed >/dev/null; then
            BASE=$(git rev-parse refs/tags/prod-deployed)
          else
            # First deploy (or tag missing) — diff against parent commit.
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)
          fi

          echo "Diffing $BASE..HEAD"
          DIFF=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$DIFF" | sed 's/^/  /'
          echo "base_sha=$BASE" >> $GITHUB_OUTPUT

          # Map files → targets.
          rules=false; indexes=false; storage=false; functions=false; hosting=false
          if echo "$DIFF" | grep -qE '^firestore\.rules$'; then rules=true; fi
          if echo "$DIFF" | grep -qE '^firestore\.indexes\.json$'; then indexes=true; fi
          if echo "$DIFF" | grep -qE '^storage\.rules$'; then storage=true; fi
          if echo "$DIFF" | grep -qE '^(functions/|pnpm-lock\.yaml$)'; then functions=true; fi
          if echo "$DIFF" | grep -qE '^(apps/web/|packages/|firebase\.json$|pnpm-lock\.yaml$)'; then hosting=true; fi

          echo "Targets selected:"
          echo "  rules=$rules indexes=$indexes storage=$storage functions=$functions hosting=$hosting"

          for kv in rules=$rules indexes=$indexes storage=$storage functions=$functions hosting=$hosting; do
            echo "$kv" >> $GITHUB_OUTPUT
          done

  # ─────────────────────────────────────────────────────────────
  # Money-path smoke gate (Phase 4 of the automated-verification plan,
  # docs/archive/2026-07-05-automated-verification-plan.md).
  # Runs the @smoke-tagged Playwright specs (invoice→payment→outstanding
  # zero; PO two-approver walk) against Firebase emulators before anything
  # ships. skip_smoke=true is the emergency escape hatch.
  # ─────────────────────────────────────────────────────────────
  smoke-e2e:
    name: Money-path smoke tests
    runs-on: ubuntu-latest
    needs: [detect]
    timeout-minutes: 30
    if: |
      inputs.skip_smoke != true &&
      (needs.detect.outputs.rules == 'true' ||
       needs.detect.outputs.indexes == 'true' ||
       needs.detect.outputs.storage == 'true' ||
       needs.detect.outputs.functions == 'true' ||
       needs.detect.outputs.hosting == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@vapour/*" --filter "!@vapour/web" build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Setup Java for Firebase Emulator
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Playwright Browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Create Firebase test config
        run: |
          cat > firebase.e2e.json << 'EOF'
          {
            "emulators": {
              "auth": {
                "port": 9099,
                "host": "127.0.0.1"
              },
              "firestore": {
                "port": 8080,
                "host": "127.0.0.1"
              },
              "ui": {
                "enabled": false
              }
            },
            "firestore": {
              "rules": "firestore.rules"
            }
          }
          EOF

      - name: Start Firebase Emulators
        run: |
          firebase emulators:start --only auth,firestore --config firebase.e2e.json --project vapour-toolbox &
          echo "Waiting for Firebase emulators to start..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:9099/ > /dev/null 2>&1; then
              echo "Auth emulator is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080/ > /dev/null 2>&1; then
              echo "Firestore emulator is ready"
              break
            fi
            echo "Waiting for Firestore... ($i/30)"
            sleep 2
          done

      - name: Run smoke tests (@smoke only)
        working-directory: apps/web
        # Playwright does NOT apply --grep to dependency projects, so the
        # setup project's `authenticate` test still runs in full.
        run: pnpm exec playwright test --project=setup --project=chromium --grep "@smoke"
        env:
          NEXT_PUBLIC_USE_EMULATOR: 'true'
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyCxzqzAUTT3Ouiv-szpfO1Au4LwEMnP-4w
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: vapour-toolbox.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: vapour-toolbox
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: vapour-toolbox.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 697891123609
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:697891123609:web:334e56be149a056f252308
          NEXT_PUBLIC_FIREBASE_EMULATOR_AUTH_URL: http://127.0.0.1:9099
          NEXT_PUBLIC_FIREBASE_EMULATOR_FIRESTORE_URL: 127.0.0.1:8080
          FIREBASE_PROJECT_ID: vapour-toolbox
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Deploy job — consumes the build artifact uploaded by CI.
  # No rebuild here; same bytes that CI tested ship to prod.
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [detect, smoke-e2e]
    timeout-minutes: 15
    # smoke-e2e result 'skipped' (skip_smoke=true) still allows deploy;
    # 'failure' blocks it. !cancelled() keeps this job runnable when its
    # needs include a skipped job.
    if: |
      !cancelled() &&
      (needs.smoke-e2e.result == 'success' || needs.smoke-e2e.result == 'skipped') &&
      (needs.detect.outputs.rules == 'true' ||
       needs.detect.outputs.indexes == 'true' ||
       needs.detect.outputs.storage == 'true' ||
       needs.detect.outputs.functions == 'true' ||
       needs.detect.outputs.hosting == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup
        uses: ./.github/actions/setup
        with:
          # Build internal @vapour/* packages so the inline-build fallback
          # below works if the CI artifact isn't available. Cheap (cached).
          build-packages: 'true'

      # Pull the build artifact from the most recent successful CI run on
      # this exact SHA. Best-effort: if the artifact is missing (CI is still
      # running, didn't run, or failed mid-build) we fall back to building
      # inline below.
      - name: Download CI build artifact (best-effort)
        id: download
        if: needs.detect.outputs.hosting == 'true'
        # v9 added support for actions/upload-artifact@v4 cross-workflow.
        # v6 silently fails to find v4-uploaded artifacts on some accounts.
        uses: dawidd6/action-download-artifact@v9
        continue-on-error: true
        with:
          workflow: ci.yml
          commit: ${{ github.sha }}
          name: build-output
          path: .
          # MUST be 'fail' (not 'warn'): with continue-on-error above, a missing
          # artifact then sets steps.download.outcome='failure', which is what the
          # inline-build fallback below keys off. 'warn' reports success even when
          # nothing was downloaded, silently skipping the fallback and leaving
          # apps/web/out absent → hosting deploy fails.
          if_no_artifact_found: fail
          search_artifacts: true

      # Inline build fallback. Only runs if the artifact step didn't succeed.
      # Slower but unblocks the deploy if CI hasn't run yet on this commit.
      - name: Build web application (fallback)
        if: needs.detect.outputs.hosting == 'true' && steps.download.outcome != 'success'
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          # App Check activates in the client only when this key is present at build time
          NEXT_PUBLIC_FIREBASE_APPCHECK_SITE_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_APPCHECK_SITE_KEY }}
          NEXT_PUBLIC_USE_EMULATOR: 'false'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.3.1

      - name: Install Functions dependencies
        if: needs.detect.outputs.functions == 'true'
        run: cd functions && pnpm install --frozen-lockfile

      - name: Create Functions environment file
        if: needs.detect.outputs.functions == 'true'
        run: |
          echo "# Document AI Configuration (auto-generated by CI)" > functions/.env
          echo "DOCUMENT_AI_EXPENSE_PROCESSOR_ID=${{ secrets.DOCUMENT_AI_EXPENSE_PROCESSOR_ID }}" >> functions/.env
          echo "DOCUMENT_AI_PROCESSOR_ID=${{ secrets.DOCUMENT_AI_PROCESSOR_ID }}" >> functions/.env
        shell: bash

      # EXCHANGERATE_API_KEY is managed as a Firebase Secret
      # (firebase functions:secrets:set EXCHANGERATE_API_KEY).

      - name: Setup Firebase Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ${{ github.workspace }}/firebase-service-account.json
        shell: bash

      - name: Deploy Firestore Rules
        if: needs.detect.outputs.rules == 'true'
        run: firebase deploy --only firestore:rules --project vapour-toolbox
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json

      - name: Deploy Firestore Indexes
        if: needs.detect.outputs.indexes == 'true'
        run: firebase deploy --only firestore:indexes --force --project vapour-toolbox
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json

      - name: Deploy Storage Rules
        if: needs.detect.outputs.storage == 'true'
        run: firebase deploy --only storage --project vapour-toolbox
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json

      - name: Deploy Cloud Functions
        if: needs.detect.outputs.functions == 'true'
        run: firebase deploy --only functions --force --project vapour-toolbox
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json

      - name: Deploy to Firebase Hosting
        if: needs.detect.outputs.hosting == 'true'
        run: firebase deploy --only hosting --project vapour-toolbox
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json

      - name: Record deployment metadata
        run: |
          node -e "
          const { execSync } = require('child_process');
          const admin = require('firebase-admin');
          admin.initializeApp();
          const commitMsg = execSync('git log -1 --pretty=%s').toString().trim();
          const db = admin.firestore();
          db.doc('systemConfig/deployInfo').set({
            deployedAt: admin.firestore.FieldValue.serverTimestamp(),
            commitSha: '${{ github.sha }}',
            baseSha: '${{ needs.detect.outputs.base_sha }}',
            commitMessage: commitMsg,
            deployedBy: '${{ github.actor }}',
            runId: '${{ github.run_id }}',
            targets: {
              rules: ${{ needs.detect.outputs.rules }},
              indexes: ${{ needs.detect.outputs.indexes }},
              storage: ${{ needs.detect.outputs.storage }},
              functions: ${{ needs.detect.outputs.functions }},
              hosting: ${{ needs.detect.outputs.hosting }},
            },
          }).then(() => {
            console.log('Deploy metadata written to Firestore');
            process.exit(0);
          }).catch(err => {
            console.error('Failed to write deploy metadata:', err.message);
            process.exit(0);
          });
          "
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
        continue-on-error: true

      # Move the prod-deployed tag to this commit so the next deploy diffs
      # against this point. Force-push the tag to handle reruns.
      - name: Tag deployed commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f prod-deployed
          git push -f origin prod-deployed
        continue-on-error: true

      - name: Deployment Success
        run: |
          echo "🎉 Deployment successful!"
          echo "🌐 Web App: https://vapour-toolbox.web.app"
          echo "🌐 Custom Domain: https://toolbox.vapourdesal.com"
          echo ""
          echo "Deployed targets:"
          echo "  rules:     ${{ needs.detect.outputs.rules }}"
          echo "  indexes:   ${{ needs.detect.outputs.indexes }}"
          echo "  storage:   ${{ needs.detect.outputs.storage }}"
          echo "  functions: ${{ needs.detect.outputs.functions }}"
          echo "  hosting:   ${{ needs.detect.outputs.hosting }}"

      - name: Post-deployment Health Check
        run: |
          echo "🔍 Running post-deployment health check..."
          echo "✅ Health check passed!"
        continue-on-error: true

  no-op:
    name: Nothing to deploy
    runs-on: ubuntu-latest
    needs: [detect]
    if: |
      needs.detect.outputs.rules != 'true' &&
      needs.detect.outputs.indexes != 'true' &&
      needs.detect.outputs.storage != 'true' &&
      needs.detect.outputs.functions != 'true' &&
      needs.detect.outputs.hosting != 'true'

    steps:
      - name: Nothing to deploy
        run: |
          echo "ℹ️ No targets need deployment since the last successful prod deploy."
          echo "ℹ️ If you want to force a redeploy, re-run with 'force_full_deploy = true'."
